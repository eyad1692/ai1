<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thinker AI - Sign In</title>
  <meta name="description" content="Securely sign in to Thinker AI platform using email verification.">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
</head>
<body>

  <main class="auth-container">
    <div class="auth-card glass" id="login">
      <div class="brand" style="justify-content: center; margin-bottom: 24px;">
        <div class="brand-icon"><i class="fas fa-brain"></i></div>
        Thinker
      </div>
      
      <h2>Welcome Back</h2>
      <p>Enter your email to receive a secure 6-digit verification code.</p>

      <form id="emailForm" onsubmit="event.preventDefault(); sendCode();">
        <div class="input-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="name@company.com" required autocomplete="email" />
        </div>
        <button type="submit" id="sendCodeBtn" class="primary">Send Verification Code</button>
      </form>

      <div class="divider">
        <span>OR</span>
      </div>

      <button type="button" class="google-btn" onclick="signInWithGoogle()">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
        Continue with Google
      </button>

      <form id="codeForm" style="display:none;" onsubmit="event.preventDefault(); verifyCode();">
        <div class="input-group">
          <label for="code">Verification Code</label>
          <input type="number" id="code" placeholder="000000" required />
        </div>
        <button type="submit" id="verifyBtn" class="primary">Verify & Sign In</button>
      </form>

      <div class="auth-footer">
        By signing in, you agree to our <a href="#">Terms of Service</a>
      </div>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
